<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Charlotte Amalie Map — St. Thomas Cruise Guide</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #0d3060 100%);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 2px solid #00b4d8;
  flex-shrink: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-icon { font-size: 24px; }
.header-title { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.1; }
.header-sub { font-size: 11px; color: #00b4d8; font-weight: 500; }

/* SEARCH */
.search-wrap { position: relative; flex: 1; max-width: 280px; }
.search-input {
  width: 100%;
  padding: 8px 14px 8px 34px;
  border-radius: 999px;
  border: 1px solid rgba(0,180,216,0.4);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 13px;
  outline: none;
}
.search-input::placeholder { color: rgba(255,255,255,0.4); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.5; pointer-events: none; }

/* CATEGORY FILTERS */
.filters {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  overflow-x: auto;
  background: rgba(0,0,0,0.3);
  flex-shrink: 0;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.filter-btn.active { background: var(--cat-color); border-color: var(--cat-color); color: #fff; }
.filter-btn:hover { opacity: 0.85; }

/* MAP + SIDEBAR LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* MAP */
#map { flex: 1; position: relative; background: #0d1b2a; overflow: hidden; cursor: grab; }
#map:active { cursor: grabbing; }
#map-img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
.map-pins { position: absolute; inset: 0; }

/* PIN */
.pin {
  position: absolute;
  transform: translate(-50%, -100%);
  cursor: pointer;
  z-index: 10;
  transition: transform 0.15s ease;
}
.pin:hover { transform: translate(-50%, -100%) scale(1.2); z-index: 20; }
.pin.active { transform: translate(-50%, -100%) scale(1.25); z-index: 30; }
.pin-body {
  width: 32px;
  height: 38px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.5);
  position: relative;
}
.pin-emoji {
  transform: rotate(45deg);
  font-size: 15px;
  line-height: 1;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: rotate(45deg) translate(-50%, -50%);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}
.pin-label {
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 9px;
  font-weight: 600;
  padding: 2px 5px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}
.pin:hover .pin-label { opacity: 1; }

/* SIDEBAR */
.sidebar {
  width: 300px;
  background: #0d1b2a;
  border-left: 1px solid rgba(0,180,216,0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.sidebar-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,180,216,0.3) transparent;
}
.sidebar-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: background 0.15s;
}
.sidebar-item:hover { background: rgba(255,255,255,0.04); }
.sidebar-item.active { background: rgba(0,180,216,0.1); border-left: 3px solid #00b4d8; }
.sidebar-pin-icon {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.sidebar-info { flex: 1; min-width: 0; }
.sidebar-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-cat { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.sidebar-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 4px;
  display: inline-block;
}

/* POPUP */
.popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.popup-overlay.open { display: flex; }
.popup {
  background: #0d1b2a;
  border-radius: 24px 24px 0 0;
  padding: 20px;
  width: 100%;
  max-width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  border-top: 3px solid #00b4d8;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.popup-close { float: right; font-size: 22px; cursor: pointer; color: rgba(255,255,255,0.5); background: none; border: none; line-height: 1; padding: 0; margin-left: 8px; }
.popup-emoji { font-size: 40px; margin-bottom: 8px; }
.popup-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.popup-category { font-size: 12px; color: #00b4d8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
.popup-desc { font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.6; margin-bottom: 14px; }
.popup-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.popup-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
}
.popup-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  background: linear-gradient(135deg, #00b4d8, #0077a8);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  border: none;
  cursor: pointer;
  margin-top: 4px;
}
.popup-btn:hover { opacity: 0.9; }

/* RESULT COUNT */
.result-count { padding: 8px 14px; font-size: 11px; color: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }

/* MOBILE */
@media (max-width: 640px) {
  .sidebar { display: none; }
  .header-title { font-size: 14px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <span class="header-icon">🏝️</span>
    <div>
      <div class="header-title">Charlotte Amalie</div>
      <div class="header-sub">St. Thomas Cruise Guide</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="Search locations..." oninput="filterPins()">
  </div>
</div>

<!-- FILTERS -->
<div class="filters" id="filters"></div>

<!-- MAIN -->
<div class="main">

  <!-- MAP -->
  <div id="map">
    <div class="map-pins" id="pins-container"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="result-count" id="result-count">Loading...</div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>

</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopup(event)">
  <div class="popup" id="popup">
    <button class="popup-close" onclick="closePopupBtn()">✕</button>
    <div id="popup-content"></div>
  </div>
</div>

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let activeFilter = 'all';
let activePin = null;
let visiblePins = [...PINS];

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  buildFilters();
  renderPins();
  renderSidebar();
}

// ═══════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════
function buildFilters() {
  const container = document.getElementById('filters');
  // All button
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.style.setProperty('--cat-color', '#00b4d8');
  allBtn.textContent = '🗺️ All';
  allBtn.onclick = () => setFilter('all', allBtn);
  container.appendChild(allBtn);

  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.style.setProperty('--cat-color', cat.color);
    btn.innerHTML = `${cat.emoji} ${cat.label}`;
    btn.dataset.cat = key;
    btn.onclick = () => setFilter(key, btn);
    container.appendChild(btn);
  });
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterPins();
}

function filterPins() {
  const q = document.getElementById('search').value.toLowerCase();
  visiblePins = PINS.filter(p => {
    const matchCat = activeFilter === 'all' || p.cat === activeFilter;
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || (p.badges || []).some(b => b.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
  renderPins();
  renderSidebar();
}

// ═══════════════════════════════════════════════
// RENDER PINS
// ═══════════════════════════════════════════════
function renderPins() {
  const container = document.getElementById('pins-container');
  container.innerHTML = '';
  visiblePins.forEach(pin => {
    const cat = CATEGORIES[pin.cat];
    const el = document.createElement('div');
    el.className = 'pin' + (activePin === pin.id ? ' active' : '');
    el.style.left = pin.x + '%';
    el.style.top = pin.y + '%';
    el.dataset.id = pin.id;

    el.innerHTML = `
      <div class="pin-label">${pin.name}</div>
      <div class="pin-body" style="background:${cat.color}">
        <span class="pin-emoji">${cat.emoji}</span>
      </div>
    `;
    el.onclick = () => openPopup(pin.id);
    container.appendChild(el);
  });
}

// ═══════════════════════════════════════════════
// RENDER SIDEBAR
// ═══════════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  const count = document.getElementById('result-count');
  count.textContent = `${visiblePins.length} location${visiblePins.length !== 1 ? 's' : ''}`;
  list.innerHTML = '';

  visiblePins.forEach(pin => {
    const cat = CATEGORIES[pin.cat];
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (activePin === pin.id ? ' active' : '');
    item.dataset.id = pin.id;
    item.innerHTML = `
      <div class="sidebar-pin-icon" style="background:${cat.color}22;color:${cat.color}">${cat.emoji}</div>
      <div class="sidebar-info">
        <div class="sidebar-name">${pin.name}</div>
        <div class="sidebar-cat">${cat.label}</div>
        ${pin.badges && pin.badges[0] ? `<span class="sidebar-badge" style="background:${cat.color}22;color:${cat.color}">${pin.badges[0]}</span>` : ''}
      </div>
    `;
    item.onclick = () => openPopup(pin.id);
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════════════
// POPUP
// ═══════════════════════════════════════════════
function openPopup(id) {
  const pin = PINS.find(p => p.id === id);
  if (!pin) return;
  activePin = id;
  renderPins();
  renderSidebar();

  const cat = CATEGORIES[pin.cat];
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(pin.name + ' Charlotte Amalie St Thomas')}`;

  document.getElementById('popup-content').innerHTML = `
    <div class="popup-emoji">${cat.emoji}</div>
    <div class="popup-name">${pin.name}</div>
    <div class="popup-category">${cat.label}</div>
    <div class="popup-desc">${pin.desc}</div>
    ${pin.badges ? `<div class="popup-badges">${pin.badges.map(b => `<span class="popup-badge">${b}</span>`).join('')}</div>` : ''}
    ${pin.tip ? `<div class="popup-desc" style="background:rgba(0,180,216,0.08);border-left:3px solid #00b4d8;padding:10px 12px;border-radius:8px;margin-bottom:12px;">💡 <strong>Local Tip:</strong> ${pin.tip}</div>` : ''}
    <a class="popup-btn" href="${mapsUrl}" target="_blank">📍 Open in Google Maps</a>
  `;
  document.getElementById('popup-overlay').classList.add('open');

  // Scroll sidebar to active item
  const activeItem = document.querySelector('.sidebar-item.active');
  if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closePopup(e) {
  if (e.target === document.getElementById('popup-overlay')) {
    closePopupBtn();
  }
}

function closePopupBtn() {
  document.getElementById('popup-overlay').classList.remove('open');
  activePin = null;
  renderPins();
  renderSidebar();
}

// ═══════════════════════════════════════════════
// MAP BACKGROUND — use OpenStreetMap tile
// ═══════════════════════════════════════════════
function setupMap() {
  const map = document.getElementById('map');
  map.style.backgroundImage = `url('https://tile.openstreetmap.org/13/2462/3438.png')`;
  map.style.backgroundSize = 'cover';
  map.style.backgroundPosition = 'center';
}

init();
</script>
