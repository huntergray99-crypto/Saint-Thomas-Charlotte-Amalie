<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Charlotte Amalie Map — St. Thomas Cruise Guide</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #0d3060 100%);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 2px solid #00b4d8;
  flex-shrink: 0;
  z-index: 1000;
  position: relative;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-title { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.1; }
.header-sub { font-size: 11px; color: #00b4d8; font-weight: 500; }
.search-wrap { position: relative; flex: 1; max-width: 280px; }
.search-input {
  width: 100%;
  padding: 8px 14px 8px 34px;
  border-radius: 999px;
  border: 1px solid rgba(0,180,216,0.4);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 13px;
  outline: none;
}
.search-input::placeholder { color: rgba(255,255,255,0.4); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.5; pointer-events: none; }

/* FILTERS */
.filters {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  overflow-x: auto;
  background: rgba(0,0,0,0.4);
  flex-shrink: 0;
  scrollbar-width: none;
  z-index: 1000;
  position: relative;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.filter-btn.active { background: var(--cat-color); border-color: var(--cat-color); color: #fff; box-shadow: 0 0 10px var(--cat-color); }

/* MAIN */
.main { display: flex; flex: 1; overflow: hidden; }
#map { flex: 1; z-index: 1; }

/* SIDEBAR */
.sidebar {
  width: 290px;
  background: #0d1b2a;
  border-left: 1px solid rgba(0,180,216,0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  z-index: 100;
}
.result-count { padding: 8px 14px; font-size: 11px; color: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
.sidebar-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(0,180,216,0.3) transparent; }
.sidebar-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: background 0.15s;
}
.sidebar-item:hover { background: rgba(255,255,255,0.04); }
.sidebar-item.active { background: rgba(0,180,216,0.1); border-left: 3px solid #00b4d8; }
.sidebar-pin-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.sidebar-info { flex: 1; min-width: 0; }
.sidebar-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-cat { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }
.sidebar-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 3px; display: inline-block; }

/* LEAFLET CUSTOM POPUP */
.leaflet-popup-content-wrapper {
  background: #0d1b2a !important;
  border: 1px solid rgba(0,180,216,0.4) !important;
  border-radius: 16px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
  padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; width: 280px !important; }
.leaflet-popup-tip { background: #0d1b2a !important; }
.leaflet-popup-close-button { color: rgba(255,255,255,0.5) !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }
.leaflet-popup-close-button:hover { color: #fff !important; }

.popup-inner { padding: 16px; }
.popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-right: 20px; }
.popup-emoji { font-size: 28px; flex-shrink: 0; }
.popup-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
.popup-category { font-size: 10px; color: #00b4d8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
.popup-desc { font-size: 12.5px; color: rgba(255,255,255,0.72); line-height: 1.55; margin-bottom: 10px; }
.popup-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.popup-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 5px; background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.65); }
.popup-tip { font-size: 12px; color: rgba(255,255,255,0.7); background: rgba(0,180,216,0.08); border-left: 3px solid #00b4d8; padding: 8px 10px; border-radius: 6px; margin-bottom: 10px; line-height: 1.5; }
.popup-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; border-radius: 10px; background: linear-gradient(135deg, #00b4d8, #0077a8); color: #fff; font-size: 13px; font-weight: 700; text-decoration: none; }
.popup-btn:hover { opacity: 0.9; }

/* MOBILE */
@media (max-width: 640px) {
  .sidebar { display: none; }
  .header-title { font-size: 14px; }
  .search-wrap { max-width: 180px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span style="font-size:24px">🏝️</span>
    <div>
      <div class="header-title">Charlotte Amalie</div>
      <div class="header-sub">St. Thomas Cruise Guide</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="Search locations..." oninput="filterPins()">
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="result-count" id="result-count">40 locations</div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>
</div>

<script>
const CATEGORIES = {
  cruise:    { label: 'Cruise Ports',     emoji: '🚢', color: '#0077a8' },
  shopping:  { label: 'Shopping',         emoji: '🛍️', color: '#7c3aed' },
  dutyfree:  { label: 'Duty Free',        emoji: '💎', color: '#d4af37' },
  food:      { label: 'Restaurants',      emoji: '🍽️', color: '#e85d04' },
  bars:      { label: 'Bars & Drinks',    emoji: '🍹', color: '#10b981' },
  beach:     { label: 'Beaches',          emoji: '🏖️', color: '#00b4d8' },
  historic:  { label: 'Historic Sites',   emoji: '🏛️', color: '#c0392b' },
  views:     { label: 'Views & Lookouts', emoji: '🌅', color: '#f0a500' },
  activity:  { label: 'Activities',       emoji: '🤿', color: '#06b6d4' },
  transport: { label: 'Getting Around',   emoji: '🚕', color: '#6b7280' },
};

const PINS = [
  { id:1,  name:'Havensight Cruise Terminal',    cat:'cruise',    lat:18.3364, lng:-64.9183, badges:['Main Terminal','Walk to Town','Havensight Mall'], desc:'The main and busiest cruise terminal in St. Thomas. Most cruise lines dock here including Carnival, Norwegian, Royal Caribbean, and Celebrity. Havensight Mall is steps away with shops, restaurants, and ATMs right at the pier.', tip:'Downtown Charlotte Amalie is a 20-25 min walk or a short $4-5 taxi ride from here.' },
  { id:2,  name:'Crown Bay Cruise Terminal',     cat:'cruise',    lat:18.3378, lng:-64.9468, badges:['Second Terminal','Taxi ~$5','Crown Bay Center'], desc:'The second cruise terminal, located west of downtown. Cunard, Princess, Holland America, and larger ships (Oasis class) typically dock here. Take a taxi for about $5 to get to downtown.', tip:'Crown Bay has its own open-air shopping plaza with jewelry stores and amenities right off the ship.' },
  { id:3,  name:'Main Street — Duty Free',       cat:'dutyfree',  lat:18.3422, lng:-64.9307, badges:['400+ Stores','Duty Free','Jewelry & Watches','Liquor Deals'], desc:'The heart of Charlotte Amalie shopping with 400+ stores offering duty-free goods. Jewelry, watches, perfume, electronics, and liquor at significant savings. Alleyways branch off Main Street filled with more shops.', tip:'US residents get an $800 duty-free allowance per person — more than any other Caribbean island. Liquor and jewelry are the best deals.' },
  { id:4,  name:'A.H. Riise Mall',               cat:'shopping',  lat:18.3425, lng:-64.9302, badges:['Historic Building','Luxury Brands','Rum Bar Inside'], desc:'One of the most famous shopping destinations in the Caribbean, housed in a historic 19th century building. Luxury goods, rum, jewelry, perfume, and duty-free items throughout multiple wings and passages.', tip:'Check out A.H. Riise Rum Bar inside — great spot for a rum tasting while you shop.' },
  { id:5,  name:'Havensight Mall',               cat:'shopping',  lat:18.3369, lng:-64.9195, badges:['At the Pier','Brand Names','Restaurants Inside'], desc:'Large outdoor shopping mall right at the Havensight cruise pier. Includes Sunglass Hut, Crocs, jewelry stores, souvenir shops, restaurants, and Gourmet Gallery grocery store.', tip:'Gourmet Gallery inside Havensight Mall is great for picking up local packaged snacks and drinks.' },
  { id:6,  name:'Yacht Haven Grande',            cat:'dutyfree',  lat:18.3385, lng:-64.9240, badges:['Luxury Brands','Gucci','Bulgari','Waterfront'], desc:'Upscale luxury shopping marina with designer brands including Gucci, Bulgari, and Coach. Beautiful waterfront setting overlooking the yacht marina. Best option for high-end luxury shopping.', tip:'Even if you\'re not shopping, the marina views here are stunning — worth a stroll.' },
  { id:7,  name:'Market Square',                 cat:'shopping',  lat:18.3440, lng:-64.9330, badges:['Local Crafts','Souvenirs','Authentic','Outdoor Market'], desc:'Historic open-air market where you\'ll find authentic local handicrafts, jewelry, clothing, and Caribbean souvenirs from local vendors. More authentic and locally made than the chain shops on Main Street.', tip:'Great place to find unique, locally made items at better prices than the tourist shops.' },
  { id:8,  name:'Palm Passage',                  cat:'shopping',  lat:18.3428, lng:-64.9310, badges:['Boutiques','Covered Passage','Charming'], desc:'Beautiful covered alleyway lined with boutique shops and cafes. One of the most charming shopping passages in Charlotte Amalie with a mix of jewelry stores, clothing boutiques, and dining options.', tip:'Cafe Amalie is located here — perfect stop for Spanish food in a beautiful courtyard setting.' },
  { id:9,  name:'Crown Bay Center',              cat:'shopping',  lat:18.3372, lng:-64.9478, badges:['At Crown Bay Pier','Jewelry Stores','ATM Available'], desc:'Shopping plaza at the Crown Bay cruise terminal. Good selection of jewelry stores and branded goods. Convenient if your ship docks at Crown Bay. ATM, coffee, tourist info, and quick bites all available.', tip:'If you dock at Crown Bay, you can find most basics right here without needing a taxi to town.' },
  { id:10, name:'The Greenhouse Restaurant',     cat:'food',      lat:18.3415, lng:-64.9288, badges:['Waterfront','Full Menu','Happy Hour Deals'], desc:'Popular open-air waterfront restaurant with an extensive menu. Burgers, seafood, local dishes. Great harbor and people-watching views from the front tables. Known for 2-for-1 drink specials.', tip:'Sit near the front for the best harbor views. Great lunch spot after shopping on Main Street.' },
  { id:11, name:"Virgilio's",                    cat:'food',      lat:18.3430, lng:-64.9318, badges:['Italian','30+ Years','Local Favorite','Romantic'], desc:'Family-owned authentic Italian restaurant tucked into a charming backstreet. Operating for 30+ years with hand-painted murals and soft Italian music. Famous for Grandma\'s Lasagna and tableside Caesar Salad.', tip:'One of the best restaurants on the island. Make reservations — it fills up fast on cruise days.' },
  { id:12, name:'Tap and Still Havensight',      cat:'food',      lat:18.3370, lng:-64.9198, badges:['Near Havensight','Burgers','Cold Beers','Casual'], desc:'Casual burger and beer spot right near the Havensight cruise pier. Perfect for cruise passengers who don\'t want to travel far. Paper menus, customize your burger, sports on TV.', tip:'Best option if you want a quick, filling meal without heading into downtown.' },
  { id:13, name:'Cafe Amalie',                   cat:'food',      lat:18.3427, lng:-64.9312, badges:['Spanish Cuisine','Outdoor Courtyard','Palm Passage'], desc:'Beautiful open-air courtyard restaurant in Palm Passage serving Spanish food. Known for the Barcelona Burger and excellent service. Feels like a street cafe in Barcelona.', tip:'Order the Barcelona Burger — locals swear by it. Beautiful setting for lunch.' },
  { id:14, name:'Enkai Sushi',                   cat:'food',      lat:18.3408, lng:-64.9270, badges:['Sushi','Waterfront Views','Reserve Outdoors'], desc:'Popular sushi spot at the pier park with indoor and outdoor seating overlooking the waterfront. American-influenced sushi with creative rolls. Outdoor tables book fast.', tip:'Try the West of Philly Roll. Book outdoor seating ahead of time for sunset views.' },
  { id:15, name:'Rum Hut',                       cat:'bars',      lat:18.3372, lng:-64.9210, badges:['Outdoor Bar','Local Spot','Cheap Drinks','Great Vibes'], desc:'Laid-back outdoor bar near the cruise port with cheap drinks and great vibes. Barstools and wooden swings at the bar. Perfect place to end your day and mingle with locals.', tip:'This is the real deal — not a tourist trap. Cheap drinks, friendly locals, good times.' },
  { id:16, name:'Paradise Bistro Bar & Grill',   cat:'bars',      lat:18.3358, lng:-64.9215, badges:['Panoramic Views','Bushwacker Cocktail','Paradise Point'], desc:'Restaurant and bar perched atop Paradise Point with panoramic views over Charlotte Amalie harbor. Famous for the Bushwacker cocktail — a creamy chocolate-rum concoction invented here in 1975.', tip:'Must try: The Bushwacker — the famous cocktail invented here in 1975. Go at sunset for best views.' },
  { id:17, name:'Petite Pump Room',              cat:'bars',      lat:18.3413, lng:-64.9280, badges:['Harbor Views','Seaplane Watching','Above Ferry Terminal'], desc:'Well-loved bar and restaurant above the ferry terminal with stunning harbor views. Great for watching ferries and seaplanes. Generous food portions at reasonable prices.', tip:'Grab a terrace table and watch the seaplanes land and take off — it\'s a show in itself.' },
  { id:18, name:'Agave Havensight',              cat:'food',      lat:18.3368, lng:-64.9200, badges:['Mexican','Cocktails','Near Havensight'], desc:'Mexican restaurant at Havensight with cocktails and solid Mexican food. A good sit-down option near the cruise pier with good margaritas.', tip:'Best Mexican food in the port area. Good margaritas to start your island day.' },
  { id:19, name:'Magens Bay Beach',              cat:'beach',     lat:18.3748, lng:-64.9392, badges:['World Famous','Calm Waters','Lifeguards','~20 min from port'], desc:'Voted one of the most beautiful beaches in the world by National Geographic. Mile-long white sand beach in a calm, protected bay. Lifeguards, kayak and paddleboard rentals, restaurants on site.', tip:'Go early — cruise passengers pour in mid-morning. Taxi from Havensight is about $10-12 each way.' },
  { id:20, name:'Coki Beach',                    cat:'beach',     lat:18.3618, lng:-64.8728, badges:['Best Snorkeling','Coral Reef','Next to Coral World','~25 min from port'], desc:'Top snorkeling beach on St. Thomas with crystal clear water and colorful reef right off the shore. Adjacent to Coral World Ocean Park. The best and most accessible snorkeling on the island.', tip:'Bring your own snorkel gear — rentals available but bringing your own saves money.' },
  { id:21, name:'Lindbergh Bay Beach',           cat:'beach',     lat:18.3368, lng:-64.9508, badges:['Near Port','Calm Waters','Less Crowded','Local Favorite'], desc:'Calm, beautiful beach close to the cruise terminals with stunning harbor views. Less crowded than Magens Bay. Popular with locals. Good for swimming and relaxing.', tip:'One of the closest beaches to the cruise ports — great if you want sand without a long taxi ride.' },
  { id:22, name:'Honeymoon Beach — Water Island', cat:'beach',    lat:18.3280, lng:-64.9530, badges:['Hidden Gem','Ferry Required','Uncrowded','Water Island'], desc:'Beautiful hidden beach on Water Island accessible by a short 5-10 minute ferry from Crown Bay Marina. Rivals Magens Bay without the cruise crowds. Short walk from the ferry dock.', tip:'Take the ferry from Crown Bay Marina — short ride, totally worth it to escape the crowds.' },
  { id:23, name:'Sapphire Beach',                cat:'beach',     lat:18.3390, lng:-64.8770, badges:['Snorkeling','Coral Reef','Water Sports','~30 min from port'], desc:'Beautiful beach on the east end with excellent snorkeling over coral reefs. Resort beach with amenities, water sports rentals, and a beach bar. About 25-30 minutes from the cruise port.', tip:'Combine with a visit to Red Hook and the east end for a perfect full day trip.' },
  { id:24, name:'Fort Christian',                cat:'historic',  lat:18.3415, lng:-64.9272, badges:['Built 1671','National Landmark','Museum Inside','$10 Admission'], desc:'The oldest standing structure in the US Virgin Islands, built by the Danish in 1671. This striking red-and-white fort is a National Historic Landmark housing the St. Thomas Museum with colonial history exhibitions.', tip:'Free to see from outside. Pay the $10 to go inside — the colonial history exhibits are genuinely fascinating.' },
  { id:25, name:'99 Steps',                      cat:'historic',  lat:18.3448, lng:-64.9325, badges:['Built 18th Century','Instagram Spot','103 Steps','Free'], desc:'Iconic Danish staircase built from ballast bricks carried by European ships, connecting lower town to upper Charlotte Amalie. Despite the name, there are actually 103 steps. One of the most photographed spots on the island.', tip:'Climb to the top for a great view. Wear comfortable shoes — the brick steps can be slippery when wet.' },
  { id:26, name:"Blackbeard's Castle",           cat:'historic',  lat:18.3452, lng:-64.9330, badges:['1679 Tower','Pirate History','Harbor Views','Bar On Site'], desc:'17th-century watchtower rumored to have been used by pirate Edward Teach (Blackbeard). Now a popular tourist spot with pirate lore, a small hotel, bar, and some of the best harbor views in Charlotte Amalie.', tip:'Get a drink at the bar and soak in the views while you hear pirate stories. Located right near the 99 Steps.' },
  { id:27, name:'Emancipation Garden',           cat:'historic',  lat:18.3418, lng:-64.9295, badges:['Historic','Free','Central Location','Iguanas!'], desc:'Historic public park commemorating the emancipation of slaves in 1848. Features a central gazebo, statues, and large iguanas sunbathing on the lawn. Peaceful green space in the heart of the shopping district.', tip:'The iguanas here are huge and surprisingly tame — great photo opportunity. Right next to Main Street.' },
  { id:28, name:'St. Thomas Synagogue',          cat:'historic',  lat:18.3440, lng:-64.9318, badges:['Built 1833','2nd Oldest in Americas','Free to Visit','Sand Floor'], desc:'The second oldest synagogue in the Western Hemisphere, built in 1833. Beautiful historic building with a distinctive sand floor. Free to visit. Fascinating piece of the island\'s Jewish history.', tip:'The sand floor honors the Jewish community\'s secret worship in Spain. Worth a quick visit.' },
  { id:29, name:"Pirates Treasure Museum",       cat:'historic',  lat:18.3375, lng:-64.9205, badges:['Pirate History','10 min from Havensight','Shipwreck Artifacts'], desc:'Fascinating museum about St. Thomas\'s rich pirate history. 10-minute walk from Havensight pier. Showcases artifacts recovered from shipwrecks with interactive exhibits about underwater recovery technology.', tip:'Great option if you have kids. Quick 45-minute visit. Conveniently close to the cruise pier.' },
  { id:30, name:'Legislature Building',          cat:'historic',  lat:18.3416, lng:-64.9274, badges:['Danish Colonial','Free to View','Next to Fort Christian'], desc:'Historic colonial-era government building directly across from Fort Christian. Beautiful bright green Danish colonial architecture — one of the most photographed facades in Charlotte Amalie.', tip:'Best viewed from outside — a great photo stop. Right next to Fort Christian and Emancipation Garden.' },
  { id:31, name:'Paradise Point Skyride',        cat:'views',     lat:18.3360, lng:-64.9218, badges:['Gondola Tram','10 min from Port','Panoramic Views','Bar at Top'], desc:'Gondola tram that whisks you up to Paradise Point in under 10 minutes from the Havensight port. Spectacular panoramic views of Charlotte Amalie harbor and surrounding islands. Restaurant and bar at the top.', tip:'Walk to the gondola from Havensight in about 10 minutes. Go at sunset if your ship departs in the evening.' },
  { id:32, name:"Drake's Seat",                  cat:'views',     lat:18.3620, lng:-64.9428, badges:['Free','Best Island Views','See BVIs & PR','Taxi Required'], desc:'Scenic overlook at the top of St. Thomas with breathtaking views of Magens Bay and surrounding islands. On a clear day you can see Puerto Rico and the British Virgin Islands. Free and accessible by taxi.', tip:'Combine Drake\'s Seat with Magens Bay in one taxi trip — they\'re near each other. Perfect half-day trip.' },
  { id:33, name:'Mountain Top',                  cat:'views',     lat:18.3678, lng:-64.9538, badges:['Highest Point','Banana Daiquiri','Duty Free Shop','Taxi Required'], desc:'The highest accessible point on St. Thomas with stunning 360-degree views. Home of the famous banana daiquiri invented here. Large duty-free shop on site. Popular cruise excursion stop.', tip:'The banana daiquiri here is legendary — don\'t leave without trying one. Views of 15 islands on a clear day.' },
  { id:34, name:'Charlotte Amalie Overlook',     cat:'views',     lat:18.3480, lng:-64.9290, badges:['Harbor Views','Free','Less Crowded'], desc:'Scenic overlook with beautiful views over Charlotte Amalie harbor and the cruise ships in port. A great free photo spot without the crowds of Paradise Point.', tip:'Great alternative to Paradise Point if you don\'t want to pay for the gondola — free views of the harbor.' },
  { id:35, name:'Coral World Ocean Park',        cat:'activity',  lat:18.3625, lng:-64.8722, badges:['Marine Park','Turtle Encounters','Underwater Observatory','Family Friendly'], desc:'Marine theme park featuring a unique underwater observatory, touch pools, sea turtle encounters, snorkeling trails, and stingray experiences. Great for families. Located next to Coki Beach.', tip:'Book the sea turtle encounter in advance — it sells out fast on cruise days.' },
  { id:36, name:'St. John Ferry (Cruz Bay)',     cat:'activity',  lat:18.3408, lng:-64.9282, badges:['30-45 min Ferry','National Park','Trunk Bay','Day Trip'], desc:'Regular ferry service from Charlotte Amalie to Cruz Bay, St. John. St. John has the Virgin Islands National Park, stunning beaches like Trunk Bay, and a barefoot laid-back vibe.', tip:'Budget at least 4-5 hours for St. John. Check ferry times carefully — you must be back before your ship leaves!' },
  { id:37, name:'Phantasea Botanical Garden',    cat:'activity',  lat:18.3548, lng:-64.9448, badges:['Botanical Garden','Orchids','Island Views','Quiet & Shady'], desc:'Small, shady tropical botanical garden about 15 minutes from the harbor. Full of local plants, flowers, and a stunning orchid collection with beautiful views of neighboring islands.', tip:'A peaceful escape from the cruise crowds. Self-guided tour takes about an hour. Perfect for plant lovers.' },
  { id:38, name:'Safari Taxi Stand — Havensight', cat:'transport', lat:18.3362, lng:-64.9188, badges:['Safari Trucks','Downtown ~$4','Magens Bay ~$10','Shared Routes'], desc:'Main taxi pick-up area at Havensight cruise pier. Taxis in St. Thomas are open-air safari trucks. Fares to downtown: ~$4-5. Fares to Magens Bay: ~$10-12. Mountain Top: ~$12.', tip:'St. Thomas taxis are shared safari trucks — totally normal! Always agree on the price BEFORE getting in.' },
  { id:39, name:'Water Island Ferry — Crown Bay', cat:'transport', lat:18.3375, lng:-64.9482, badges:['5-10 min Ferry','Water Island','Honeymoon Beach Access'], desc:'Short 5-10 minute ferry to Water Island departing from Crown Bay Marina. Runs several times per day. Leads to Honeymoon Beach — one of the most beautiful uncrowded beaches in the USVI.', tip:'Check the ferry schedule — limited departures. Great way to escape the cruise crowds.' },
  { id:40, name:'Charlotte Amalie Ferry Terminal', cat:'transport', lat:18.3410, lng:-64.9285, badges:['St. John Ferry','Tortola','Regular Service'], desc:'Main ferry terminal for boats to St. John (Cruz Bay), Tortola, and other USVI destinations. Regular service throughout the day. Round trip to St. John is about $30-35.', tip:'Buy ferry tickets in advance during peak cruise season — they can sell out.' },
];

// State
let activeFilter = 'all';
let activeMarkerId = null;
let markers = {};
let visiblePins = [...PINS];

// Init Leaflet map
const map = L.map('map', {
  center: [18.342, -64.930],
  zoom: 14,
  zoomControl: true,
}).setView([18.342, -64.930], 14);

// Tile layer — OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

// Build custom marker icon
function makeIcon(cat, isActive) {
  const color = CATEGORIES[cat].color;
  const emoji = CATEGORIES[cat].emoji;
  const size = isActive ? 44 : 36;
  const html = `
    <div style="
      width:${size}px;height:${size}px;
      background:${color};
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      box-shadow:0 3px 10px rgba(0,0,0,0.5);
      border:2px solid rgba(255,255,255,0.6);
      display:flex;align-items:center;justify-content:center;
      position:relative;
    ">
      <span style="transform:rotate(45deg);font-size:${isActive?18:14}px;position:absolute;top:50%;left:50%;transform:rotate(45deg) translate(-50%,-50%);display:flex;align-items:center;justify-content:center;">${emoji}</span>
    </div>`;
  return L.divIcon({
    html,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size],
    popupAnchor: [0, -size],
  });
}

// Build popup content
function makePopupContent(pin) {
  const cat = CATEGORIES[pin.cat];
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(pin.name + ' Charlotte Amalie St Thomas USVI')}`;
  return `
    <div class="popup-inner">
      <div class="popup-header">
        <span class="popup-emoji">${cat.emoji}</span>
        <div>
          <div class="popup-name">${pin.name}</div>
          <div class="popup-category">${cat.label}</div>
        </div>
      </div>
      <div class="popup-desc">${pin.desc}</div>
      ${pin.badges ? `<div class="popup-badges">${pin.badges.map(b=>`<span class="popup-badge">${b}</span>`).join('')}</div>` : ''}
      ${pin.tip ? `<div class="popup-tip">💡 <strong>Local Tip:</strong> ${pin.tip}</div>` : ''}
      <a class="popup-btn" href="${mapsUrl}" target="_blank">📍 Open in Google Maps</a>
    </div>`;
}

// Render all markers
function renderMarkers() {
  // Remove old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  visiblePins.forEach(pin => {
    const isActive = activeMarkerId === pin.id;
    const marker = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.cat, isActive) });
    marker.bindPopup(makePopupContent(pin), { maxWidth: 300, minWidth: 280 });
    marker.on('click', () => {
      activeMarkerId = pin.id;
      renderMarkers();
      renderSidebar();
      scrollSidebarTo(pin.id);
    });
    marker.on('popupclose', () => {
      activeMarkerId = null;
      renderMarkers();
      renderSidebar();
    });
    marker.addTo(map);
    markers[pin.id] = marker;
  });
}

// Render sidebar
function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  const count = document.getElementById('result-count');
  count.textContent = `${visiblePins.length} location${visiblePins.length !== 1 ? 's' : ''}`;
  list.innerHTML = '';

  visiblePins.forEach(pin => {
    const cat = CATEGORIES[pin.cat];
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (activeMarkerId === pin.id ? ' active' : '');
    item.dataset.id = pin.id;
    item.innerHTML = `
      <div class="sidebar-pin-icon" style="background:${cat.color}22;color:${cat.color}">${cat.emoji}</div>
      <div class="sidebar-info">
        <div class="sidebar-name">${pin.name}</div>
        <div class="sidebar-cat">${cat.label}</div>
        ${pin.badges?.[0] ? `<span class="sidebar-badge" style="background:${cat.color}22;color:${cat.color}">${pin.badges[0]}</span>` : ''}
      </div>`;
    item.onclick = () => {
      activeMarkerId = pin.id;
      renderMarkers();
      renderSidebar();
      map.setView([pin.lat, pin.lng], 16, { animate: true });
      setTimeout(() => markers[pin.id]?.openPopup(), 400);
    };
    list.appendChild(item);
  });
}

function scrollSidebarTo(id) {
  setTimeout(() => {
    const el = document.querySelector(`.sidebar-item[data-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

// Build filter buttons
function buildFilters() {
  const container = document.getElementById('filters');
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.style.setProperty('--cat-color', '#00b4d8');
  allBtn.innerHTML = '🗺️ All';
  allBtn.onclick = () => { activeFilter = 'all'; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); allBtn.classList.add('active'); filterPins(); };
  container.appendChild(allBtn);

  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.style.setProperty('--cat-color', cat.color);
    btn.innerHTML = `${cat.emoji} ${cat.label}`;
    btn.onclick = () => { activeFilter = key; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); filterPins(); };
    container.appendChild(btn);
  });
}

function filterPins() {
  const q = document.getElementById('search').value.toLowerCase();
  visiblePins = PINS.filter(p => {
    const matchCat = activeFilter === 'all' || p.cat === activeFilter;
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || (p.badges||[]).some(b=>b.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
  renderMarkers();
  renderSidebar();
}

buildFilters();
renderMarkers();
renderSidebar();
</script>
</body>
</html>
