<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Charlotte Amalie Map — St. Thomas Cruise Guide</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" crossorigin="anonymous"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --navy: #0b2240;
  --aqua: #00b4d8;
  --gold: #f0a500;
  --sand: #f5efe6;
  --white: #ffffff;
  --text: #1a1a2e;
  --muted: #6b7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* HEADER */
.header {
  height: 52px;
  background: linear-gradient(135deg, #0b2240 0%, #0d3060 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  gap: 10px;
  border-bottom: 2px solid var(--aqua);
  position: relative;
  z-index: 1000;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
.header-title { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.15; }
.header-sub { font-size: 10px; color: var(--aqua); font-weight: 600; }
.search-wrap { position: relative; flex: 1; max-width: 260px; }
.search-input {
  width: 100%;
  padding: 7px 12px 7px 32px;
  border-radius: 999px;
  border: 1px solid rgba(0,180,216,0.4);
  background: rgba(255,255,255,0.09);
  color: #fff;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--aqua); }
.search-input::placeholder { color: rgba(255,255,255,0.38); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: 0.45; pointer-events: none; }

/* CATEGORY BAR */
.cat-bar {
  display: flex;
  gap: 6px;
  padding: 7px 12px;
  overflow-x: auto;
  background: rgba(11,34,64,0.92);
  backdrop-filter: blur(6px);
  flex-shrink: 0;
  scrollbar-width: none;
  position: relative;
  z-index: 1000;
  border-bottom: 1px solid rgba(0,180,216,0.15);
}
.cat-bar::-webkit-scrollbar { display: none; }
.cat-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.68);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  flex-shrink: 0;
}
.cat-btn.active {
  background: var(--cc);
  border-color: var(--cc);
  color: #fff;
  box-shadow: 0 0 8px var(--cc);
}

/* LAYOUT */
.body-wrap { display: flex; height: calc(100vh - 52px - 42px); }
#map { flex: 1; }

/* SIDEBAR */
.sidebar {
  width: 285px;
  background: #0a1828;
  border-left: 1px solid rgba(0,180,216,0.18);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 100;
}
.sidebar-count { padding: 7px 14px; font-size: 11px; color: rgba(255,255,255,0.38); border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
.sidebar-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(0,180,216,0.25) transparent; }
.s-item {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 10px 13px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.14s;
}
.s-item:hover { background: rgba(255,255,255,0.04); }
.s-item.active { background: rgba(0,180,216,0.1); border-left: 3px solid var(--aqua); padding-left: 10px; }
.s-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.s-name { font-size: 12.5px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-cat { font-size: 10.5px; color: rgba(255,255,255,0.38); margin-top: 1px; }
.s-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 3px; display: inline-block; }

/* POPUP */
.leaflet-popup-content-wrapper {
  background: #fff !important;
  border-radius: 16px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.22) !important;
  padding: 0 !important;
  overflow: hidden;
  border: none !important;
}
.leaflet-popup-content { margin: 0 !important; width: 290px !important; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.leaflet-popup-tip-container { margin-top: -1px; }
.leaflet-popup-tip { background: #fff !important; }
.leaflet-popup-close-button { color: #999 !important; font-size: 20px !important; top: 10px !important; right: 12px !important; z-index: 10; }
.leaflet-popup-close-button:hover { color: #333 !important; }

.p-cat-bar { height: 4px; width: 100%; }
.p-body { padding: 14px 16px 16px; }
.p-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 9px; padding-right: 18px; }
.p-emoji { font-size: 30px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
.p-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; }
.p-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 3px; }
.p-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 9px; }
.p-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 5px; background: #f1f5f9; color: #475569; }
.p-desc { font-size: 12.5px; color: #4a5568; line-height: 1.58; margin-bottom: 10px; }
.p-tip { font-size: 12px; color: #374151; background: #eff8ff; border-left: 3px solid var(--aqua); padding: 8px 10px; border-radius: 0 7px 7px 0; margin-bottom: 12px; line-height: 1.5; }
.p-tip strong { color: #0077a8; }
.p-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 11px; border-radius: 10px;
  background: linear-gradient(135deg, #00b4d8, #0077a8);
  color: #fff; font-size: 13px; font-weight: 700;
  text-decoration: none; border: none; cursor: pointer;
  transition: opacity 0.18s;
}
.p-btn:hover { opacity: 0.88; }

/* MOBILE */
@media (max-width: 640px) {
  .sidebar { display: none; }
  .search-wrap { max-width: 170px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span style="font-size:22px">🏝️</span>
    <div>
      <div class="header-title">Charlotte Amalie</div>
      <div class="header-sub">St. Thomas Cruise Guide</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="Search locations..." oninput="doFilter()">
  </div>
</div>

<div class="cat-bar" id="cat-bar"></div>

<div class="body-wrap">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-count" id="s-count">40 locations</div>
    <div class="sidebar-list" id="s-list"></div>

</div>

    desc:'The highest accessible viewpoint on St. Thomas with staggering 360-degree views of up to 15 islands on a clear day. Home to the world-famous banana daiquiri, created here using Cruzan rum. Large duty-free shop on site.',
    tip:'The banana daiquiri is absolutely legendary — this is where it was invented and it doesn\'t disappoint. Must-do on any St. Thomas visit.' },

  { id:34, name:'Charlotte Amalie Overlook',      cat:'views',     lat:18.3480, lng:-64.9290,

  { id:35, name:'Coral World Ocean Park',         cat:'activity',  lat:18.3625, lng:-64.8722,
    badges:['Sea Turtle Encounters','Underwater Observatory','Snorkeling Trail','Great for Families'],
    desc:'A world-class marine park and one of the top family attractions on the island. Features a unique underwater observatory where you descend below the surface without getting wet, sea turtle encounters, touch pools, stingray experiences, and a guided snorkeling trail.',

  { id:36, name:'St. John Ferry (Cruz Bay)',      cat:'activity',  lat:18.3408, lng:-64.9282,
    badges:['30-45 min Ferry Ride','Virgin Islands National Park','Trunk Bay','Best Day Trip from St. Thomas'],
    desc:'Regular ferry service from Charlotte Amalie\'s ferry terminal to Cruz Bay, St. John — one of the best day trips in the entire Caribbean. St. John is home to the Virgin Islands National Park, the world-famous Trunk Bay beach, and a relaxed barefoot vibe completely different from busy Charlotte Amalie.',
    tip:'Budget at least 4-5 hours on St. John. Most importantly — know your ship\'s all-aboard time and leave St. John with plenty of buffer. Missing the ship is a real risk.' },

  { id:37, name:'Phantasea Botanical Garden',     cat:'activity',  lat:18.3548, lng:-64.9448,
    badges:['Tropical Garden','Stunning Orchids','Island Views','Peaceful & Shady'],
    desc:'A small, shaded tropical botanical garden about 15 minutes by taxi from the harbor. Beautiful collection of local Caribbean plants, flowers, and one of the finest orchid collections in the islands, along with sweeping views of neighboring islands.',
    tip:'A perfect escape from the heat and the cruise crowds. Self-guided tour takes about an hour. Especially good for plant and nature lovers.' },

  { id:38, name:'Safari Taxi Stand — Havensight', cat:'transport', lat:18.3362, lng:-64.9188,
    badges:['Open-Air Safari Trucks','Downtown ~$4-5','Magens Bay ~$10-12','Shared Rides'],
    desc:'The main taxi pickup area at the Havensight cruise pier. Taxis in St. Thomas are open-air safari trucks — shared vehicles that run set routes. Flag one down, tell the driver your destination, and agree on the fare before getting in. Totally safe and normal.',

    desc:'A short 5-10 minute ferry from Crown Bay Marina to Water Island — the fourth US Virgin Island and a true hidden gem. Runs several times per day but with limited frequency. Leads to Honeymoon Beach, one of the most beautiful and uncrowded beaches in the USVI.',

    desc:'The main public ferry terminal for inter-island travel. Regular daily service to Cruz Bay on St. John (30-45 min, best day trip from Charlotte Amalie) and connections to Tortola and other British Virgin Islands destinations.',
    tip:'Buy round-trip tickets in advance during peak cruise season — ferries fill up. Confirm the last ferry back to St. Thomas before you go.' },

/* ── LEAFLET MAP ── */
var map = L.map('map', { zoomControl: false })
  .setView([18.342, -64.928], 14);

/* Esri World Imagery (satellite) */
L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19, attribution: '© Esri' }
).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

/* ── STATE ── */
var activeCat = 'all';
var activeId  = null;
var markerMap = {};
var visible   = PINS.slice();

/* ── ICONS ── */
function makeIcon(cat, isActive) {
  var c    = CATS[cat];
  var col  = c.color;
  var em   = c.emoji;
  var sz   = isActive ? 42 : 34;
  var html = '<div style="width:'+sz+'px;height:'+sz+'px;background:'+col+';border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 3px 12px rgba(0,0,0,0.55);border:2px solid rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;position:relative;">'
           + '<span style="position:absolute;top:50%;left:50%;transform:rotate(45deg) translate(-50%,-50%);font-size:'+(isActive?17:13)+'px;display:flex;align-items:center;justify-content:center;">'+em+'</span>'
           + '</div>';
  return L.divIcon({ html:html, className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz], popupAnchor:[0,-sz] });
}

/* ── POPUP HTML ── */
function popupHtml(pin) {
  var c   = CATS[pin.cat];
  var url = 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(pin.name+' Charlotte Amalie St Thomas USVI');
  var badges = (pin.badges||[]).map(function(b){ return '<span class="p-badge">'+b+'</span>'; }).join('');
  var tip = pin.tip ? '<div class="p-tip">💡 <strong>Local Tip:</strong> '+pin.tip+'</div>' : '';
  return '<div class="p-cat-bar" style="background:'+c.color+'"></div>'
       + '<div class="p-body">'
       +   '<div class="p-header">'
       +     '<span class="p-emoji">'+c.emoji+'</span>'
       +     '<div><div class="p-name">'+pin.name+'</div><div class="p-type" style="color:'+c.color+'">'+c.label+'</div></div>'
       +   '</div>'
       +   (badges ? '<div class="p-badges">'+badges+'</div>' : '')
       +   '<div class="p-desc">'+pin.desc+'</div>'
       +   tip
       +   '<a class="p-btn" href="'+url+'" target="_blank">📍 Open in Google Maps</a>'
       + '</div>';
}

/* ── RENDER MARKERS ── */
function renderMarkers() {
  Object.values(markerMap).forEach(function(m){ map.removeLayer(m); });
  markerMap = {};
  visible.forEach(function(pin) {
    var m = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.cat, activeId===pin.id) })
      .bindPopup(popupHtml(pin), { maxWidth:310, minWidth:290, autoPan:true });
    m.on('click', function(){
      activeId = pin.id;
      renderMarkers();
      renderSidebar();
      scrollSidebar(pin.id);
      // re-open popup on new marker
      setTimeout(function(){ markerMap[pin.id] && markerMap[pin.id].openPopup(); }, 50);
    });
    m.on('popupclose', function(){
      activeId = null;
      renderMarkers();
      renderSidebar();
    });
    m.addTo(map);
    markerMap[pin.id] = m;
  });
}

/* ── SIDEBAR ── */
function renderSidebar() {
  var list = document.getElementById('s-list');
  document.getElementById('s-count').textContent = visible.length + ' location' + (visible.length!==1?'s':'');
  list.innerHTML = '';
  visible.forEach(function(pin) {
    var c    = CATS[pin.cat];
    var item = document.createElement('div');
    item.className = 's-item' + (activeId===pin.id ? ' active' : '');
    item.dataset.id = pin.id;
    item.innerHTML = '<div class="s-icon" style="background:'+c.color+'22;color:'+c.color+'">'+c.emoji+'</div>'
      + '<div style="flex:1;min-width:0">'
      +   '<div class="s-name">'+pin.name+'</div>'
      +   '<div class="s-cat">'+c.label+'</div>'
      +   (pin.badges&&pin.badges[0] ? '<span class="s-badge" style="background:'+c.color+'22;color:'+c.color+'">'+pin.badges[0]+'</span>' : '')
      + '</div>';
    item.onclick = function() {
      activeId = pin.id;
      renderMarkers();
      renderSidebar();
      map.setView([pin.lat, pin.lng], 16, { animate:true });
      setTimeout(function(){ markerMap[pin.id] && markerMap[pin.id].openPopup(); }, 450);
    };
    list.appendChild(item);
  });
}

function scrollSidebar(id) {
  setTimeout(function(){
    var el = document.querySelector('.s-item[data-id="'+id+'"]');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 80);
}

/* ── FILTERS ── */
function buildCatBar() {
  var bar = document.getElementById('cat-bar');
  var allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.style.setProperty('--cc','#00b4d8');
  allBtn.innerHTML = '🗺️ All';
  allBtn.onclick = function(){ activeCat='all'; setActive(allBtn); doFilter(); };
  bar.appendChild(allBtn);

  Object.entries(CATS).forEach(function(e){
    var key=e[0], cat=e[1];
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.style.setProperty('--cc', cat.color);
    btn.innerHTML = cat.emoji + ' ' + cat.label;
    btn.onclick = function(){ activeCat=key; setActive(btn); doFilter(); };
    bar.appendChild(btn);
  });
}

function setActive(btn) {
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

function doFilter() {
  var q = document.getElementById('search').value.toLowerCase();
  visible = PINS.filter(function(p){
    var matchCat    = activeCat==='all' || p.cat===activeCat;
    var matchSearch = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || (p.badges||[]).some(function(b){ return b.toLowerCase().includes(q); });
    return matchCat && matchSearch;
  });
  renderMarkers();
  renderSidebar();
}

buildCatBar();
renderMarkers();
renderSidebar();
</script>
</body>
</html>
